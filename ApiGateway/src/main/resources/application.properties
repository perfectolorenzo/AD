#eureka.client.serviceUrl.defaultZone=http://localhost:8500/eureka/
#spring.application.name=ApiGateway
#spring.cloud.gateway.discovery.locator.enabled=true
#server.port=8080
spring.application.name=gateway
server.port=8080

# Eureka: usar pero NO registrarse
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8500/eureka/

# Activar descubrimiento automático (opcional)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# -----------------------------
# RUTAS EXPLÍCITAS DEL GATEWAY
# -----------------------------

# Usuarios
spring.cloud.gateway.routes[0].id=usuarios
spring.cloud.gateway.routes[0].uri=lb://usuarios
spring.cloud.gateway.routes[0].predicates[0]=Path=/usuarios/**

# Reservas
spring.cloud.gateway.routes[1].id=reservas
spring.cloud.gateway.routes[1].uri=lb://reservas
spring.cloud.gateway.routes[1].predicates[0]=Path=/reservas/**

# Comentarios (REST)
spring.cloud.gateway.routes[2].id=comentarios
spring.cloud.gateway.routes[2].uri=lb://comentarios
spring.cloud.gateway.routes[2].predicates[0]=Path=/comentarios/**

# Comentarios (GraphQL)
spring.cloud.gateway.routes[3].id=comentarios-graphql
spring.cloud.gateway.routes[3].uri=lb://comentarios
spring.cloud.gateway.routes[3].predicates[0]=Path=/graphql

# Comentarios (GraphiQL)
spring.cloud.gateway.routes[4].id=comentarios-graphiql
spring.cloud.gateway.routes[4].uri=lb://comentarios
spring.cloud.gateway.routes[4].predicates[0]=Path=/comentarios


